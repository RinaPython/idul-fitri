<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplop Idul Fitri 1445 H - Premium</title>
    <!-- Font Awesome 5 (ikon) -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <!-- Google Fonts untuk Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Semua style tetap sama seperti sebelumnya */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b3a2e 0%, #1e6b4c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Pattern dan dekorasi (sama seperti sebelumnya) */
        .pattern-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.1) 2px, transparent 2px),
                radial-gradient(circle at 90% 70%, rgba(255, 215, 0, 0.1) 3px, transparent 3px),
                radial-gradient(circle at 30% 80%, rgba(255, 215, 0, 0.08) 4px, transparent 4px),
                radial-gradient(circle at 70% 30%, rgba(255, 215, 0, 0.08) 2px, transparent 2px),
                repeating-linear-gradient(45deg, rgba(210, 180, 140, 0.03) 0px, rgba(210, 180, 140, 0.03) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        .moon-star {
            position: absolute;
            color: rgba(255, 255, 180, 0.2);
            font-size: 180px;
            top: 10px;
            right: 20px;
            transform: rotate(15deg);
            z-index: 0;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        .star-1, .star-2, .star-3, .star-4, .star-5 {
            position: absolute;
            color: rgba(255, 240, 150, 0.3);
            z-index: 0;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.2));
            animation: twinkle 4s ease-in-out infinite;
        }
        .star-1 { font-size: 70px; bottom: 60px; left: 20px; animation-delay: 0s; }
        .star-2 { font-size: 50px; top: 120px; left: 80px; transform: rotate(10deg); animation-delay: 1s; }
        .star-3 { font-size: 100px; bottom: 100px; right: 50px; opacity: 0.25; animation-delay: 2s; }
        .star-4 { font-size: 40px; top: 200px; right: 150px; animation-delay: 1.5s; }
        .star-5 { font-size: 60px; bottom: 200px; left: 150px; animation-delay: 2.5s; }

        @keyframes float {
            0% { transform: rotate(15deg) translateY(0px); }
            50% { transform: rotate(15deg) translateY(-15px); }
            100% { transform: rotate(15deg) translateY(0px); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        /* Style amplop (sama seperti sebelumnya) */
        .envelope-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: linear-gradient(145deg, #f7d9b0, #efc89a);
            border: 3px solid #e6b87e;
            box-shadow: 0 25px 35px rgba(0,0,0,0.5), 0 0 0 2px #f7d44a inset, 0 0 0 5px #1f4d3d inset;
            border-radius: 20px 20px 12px 12px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 0 auto;
            overflow: hidden;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 40%, rgba(255, 215, 0, 0.1) 50%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .envelope:hover {
            transform: scale(1.03);
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), 0 0 0 2px #f7d44a inset, 0 0 0 5px #1f4d3d inset;
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #f5b37c;
            transform-origin: top;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 3;
            border-radius: 15px 15px 0 0;
            filter: drop-shadow(0 -5px 5px rgba(0,0,0,0.2));
        }

        .flap::after {
            content: '';
            position: absolute;
            top: -100px;
            left: -150px;
            width: 300px;
            height: 100px;
            background: linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
            pointer-events: none;
        }

        .envelope.open .flap {
            transform: rotateX(180deg);
        }

        .envelope-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, #e6b87e 0%, #f7d9b0 30%, #efc89a 70%, #e6b87e 100%);
            border-radius: 0 0 12px 12px;
            z-index: 1;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }

        .envelope-sticker, .envelope-sticker-left {
            position: absolute;
            top: 20px;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #e6b87e, #d4a373);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #faf0c0;
            font-size: 26px;
            box-shadow: 0 6px 0 #a05c3c, 0 0 0 4px #f8e3a7, 0 0 15px rgba(255, 215, 0, 0.5);
            z-index: 4;
            transition: all 0.3s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .envelope-sticker {
            right: 20px;
        }

        .envelope-sticker-left {
            left: 20px;
        }

        .envelope-sticker i, .envelope-sticker-left i {
            transform: rotate(5deg);
            transition: transform 0.3s ease;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .envelope-sticker.torn, .envelope-sticker-left.torn {
            animation: premiumTear 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }

        .envelope-sticker.torn i, .envelope-sticker-left.torn i {
            animation: fadeIcon 0.4s ease forwards;
        }

        @keyframes premiumTear {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
                box-shadow: 0 6px 0 #a05c3c, 0 0 0 4px #f8e3a7, 0 0 15px rgba(255, 215, 0, 0.5);
            }
            20% {
                transform: scale(1.2) rotate(5deg);
                box-shadow: 0 8px 0 #a05c3c, 0 0 0 6px #f8e3a7, 0 0 20px rgba(255, 215, 0, 0.8);
            }
            40% {
                transform: scale(0.8) rotate(-10deg);
                box-shadow: 0 3px 0 #a05c3c, 0 0 0 3px #f8e3a7;
            }
            60% {
                transform: scale(1.1) rotate(8deg) translateY(-10px);
                opacity: 0.6;
                box-shadow: 0 2px 0 #a05c3c, 0 0 0 2px #f8e3a7;
            }
            80% {
                transform: scale(0.5) rotate(-20deg) translateY(-20px);
                opacity: 0.2;
                box-shadow: none;
            }
            100% {
                transform: scale(0) rotate(-30deg) translateY(-40px);
                opacity: 0;
                box-shadow: none;
            }
        }

        @keyframes fadeIcon {
            0% { opacity: 1; transform: rotate(5deg) scale(1); }
            50% { opacity: 0.3; transform: rotate(15deg) scale(0.5); }
            100% { opacity: 0; transform: rotate(25deg) scale(0); }
        }

        .envelope-text {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: #1f4d3d;
            font-weight: 600;
            font-size: 16px;
            text-shadow: 1px 1px 0 #f7d44a;
            z-index: 2;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            margin: 0 60px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .eid-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: premiumFadeIn 0.5s ease;
        }

        .eid-modal.show {
            display: flex;
        }

        .eid-modal-content {
            max-width: 95%;
            max-height: 90%;
            overflow-y: auto;
            border-radius: 60px 60px 60px 60px;
            box-shadow: 0 40px 70px rgba(0, 0, 0, 0.8), 0 0 0 4px #f7d44a, 0 0 0 8px #1f4d3d;
            animation: premiumSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            background: transparent;
            
            scrollbar-width: thin;
            scrollbar-color: #f7d44a #1f4d3d;
        }

        .eid-modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .eid-modal-content::-webkit-scrollbar-track {
            background: #1f4d3d;
            border-radius: 10px;
            border: 1px solid #f7d44a;
        }

        .eid-modal-content::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #f7d44a, #e6b87e);
            border-radius: 10px;
            border: 1px solid #b88633;
        }

        .eid-modal-content::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ffe270, #f7d44a);
        }

        @keyframes premiumFadeIn {
            from { opacity: 0; backdrop-filter: blur(0px); }
            to { opacity: 1; backdrop-filter: blur(15px); }
        }

        @keyframes premiumSlideUp {
            from { transform: translateY(100px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .close-eid-modal {
            position: fixed;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1002;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            transition: all 0.3s;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(31, 77, 61, 0.7);
            border-radius: 50%;
            border: 3px solid #f7d44a;
            box-shadow: 0 0 25px rgba(247, 212, 74, 0.5);
        }

        .close-eid-modal:hover {
            color: #f7d44a;
            transform: scale(1.15) rotate(90deg);
            background: rgba(31, 77, 61, 0.9);
            box-shadow: 0 0 35px rgba(247, 212, 74, 0.8);
        }

        @media (max-width: 600px) {
            .envelope {
                width: 260px;
                height: 170px;
            }
            .flap {
                border-left: 130px solid transparent;
                border-right: 130px solid transparent;
                border-top: 85px solid #f5b37c;
            }
            .envelope-body {
                height: 85px;
            }
            .envelope-sticker, .envelope-sticker-left {
                width: 45px;
                height: 45px;
                font-size: 22px;
                top: 15px;
            }
            .envelope-sticker { right: 15px; }
            .envelope-sticker-left { left: 15px; }
            .envelope-text {
                font-size: 14px;
                margin: 0 40px;
                bottom: 10px;
            }
            .close-eid-modal {
                top: 15px;
                right: 20px;
                font-size: 45px;
                width: 55px;
                height: 55px;
            }
            .eid-modal-content::-webkit-scrollbar {
                width: 5px;
            }
        }

        /* Anti view-source */
        .anti-source {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Elemen latar dekoratif premium -->
    <div class="pattern-overlay"></div>
    <div class="moon-star"><i class="fas fa-moon"></i></div>
    <div class="star-1"><i class="fas fa-star"></i></div>
    <div class="star-2"><i class="fas fa-star"></i></div>
    <div class="star-3"><i class="fas fa-star"></i></div>
    <div class="star-4"><i class="fas fa-star"></i></div>
    <div class="star-5"><i class="fas fa-star"></i></div>

    <!-- AMPLOP PREMIUM DI TENGAH -->
    <div class="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="envelope-body"></div>
            
            <!-- Stiker kanan atas -->
            <div class="envelope-sticker" id="envelopeStickerRight">
                <i class="fas fa-star"></i>
            </div>
            
            <!-- Stiker kiri atas -->
            <div class="envelope-sticker-left" id="envelopeStickerLeft">
                <i class="fas fa-star"></i>
            </div>
            
            <!-- Teks "Klik untuk Membuka" -->
            <div class="envelope-text">
                ✨ Klik untuk Membuka ✨
            </div>
        </div>
    </div>

    <!-- MODAL PREMIUM UNTUK ISI IDUL FITRI -->
    <div class="eid-modal" id="eidModal">
        <span class="close-eid-modal" id="closeModalBtn">&times;</span>
        <div class="eid-modal-content" id="eidModalContent">
            <!-- Konten akan dimuat secara dinamis melalui JavaScript -->
        </div>
    </div>

    <!-- Elemen kosong untuk mengalihkan perhatian -->
    <div class="anti-source"></div>

    <script>
        // ============================================
        // PROTEKSI ANTI VIEW-SOURCE
        // ============================================
        
        // 1. Deteksi DevTools
        (function() {
            const devtools = {
                isOpen: false,
                orientation: undefined
            };
            
            // Cek console.log
            const element = new Image();
            Object.defineProperty(element, 'id', {
                get: function() {
                    devtools.isOpen = true;
                    handleDevToolsOpen();
                }
            });
            
            console.log(element);
            
            // Cek ukuran window
            const checkDevTools = function() {
                const widthThreshold = window.outerWidth - window.innerWidth > 160;
                const heightThreshold = window.outerHeight - window.innerHeight > 160;
                
                if (widthThreshold || heightThreshold) {
                    devtools.isOpen = true;
                    handleDevToolsOpen();
                }
            };
            
            // Fungsi untuk menangani DevTools terbuka
            function handleDevToolsOpen() {
                if (devtools.isOpen) {
                    // Redirect atau tampilkan pesan
                    document.body.innerHTML = '<div style="text-align: center; padding: 50px; color: white; background: linear-gradient(145deg, #0b3a2e 0%, #1e6b4c 100%); min-height: 100vh;"><h1 style="font-size: 2rem;">🔒 Konten Dilindungi</h1><p style="margin-top: 20px;">Maaf, halaman ini tidak dapat diakses melalui Developer Tools.</p></div>';
                    
                    // Hentikan eksekusi
                    throw new Error('Akses ditolak');
                }
            }
            
            // Cek setiap 2 detik
            setInterval(checkDevTools, 2000);
            
            // Cek saat resize
            window.addEventListener('resize', checkDevTools);
        })();

        // 2. Disable klik kanan
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 3. Disable shortcut keyboard untuk DevTools
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            
            // Ctrl+Shift+I / Cmd+Opt+I
            if ((e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.metaKey && e.altKey && e.key === 'I')) {
                e.preventDefault();
                return false;
            }
            
            // Ctrl+Shift+J / Cmd+Opt+J
            if ((e.ctrlKey && e.shiftKey && e.key === 'J') || 
                (e.metaKey && e.altKey && e.key === 'J')) {
                e.preventDefault();
                return false;
            }
            
            // Ctrl+Shift+C / Cmd+Opt+C
            if ((e.ctrlKey && e.shiftKey && e.key === 'C') || 
                (e.metaKey && e.altKey && e.key === 'C')) {
                e.preventDefault();
                return false;
            }
            
            // Ctrl+U (View Source)
            if ((e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
            
            // Ctrl+S (Save)
            if ((e.ctrlKey && e.key === 's') || (e.ctrlKey && e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
        });

        // 4. Disable text selection
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });

        // 5. Disable copy
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            return false;
        });

        // 6. Disable cut
        document.addEventListener('cut', function(e) {
            e.preventDefault();
            return false;
        });

        // 7. Disable paste
        document.addEventListener('paste', function(e) {
            e.preventDefault();
            return false;
        });

        // 8. Override console methods
        if (window.console) {
            const methods = ['log', 'debug', 'info', 'warn', 'error', 'table'];
            methods.forEach(function(method) {
                console[method] = function() {};
            });
        }

        // 9. Enkripsi konten utama
        (function() {
            // Konten dienkripsi dengan Base64 (ganda)
            const encryptedContent = "PCFET0NUWVBFIGh0bWw+CjxodG1sIGxhbmc9ImlkIj4KPGhlYWQ+CiAgICA8bWV0YSBjaGFyc2V0PSJVVEYtOCI+CiAgICA8bWV0YSBuYW1lPSJ2aWV3cG9ydCIgY29udGVudD0id2lkdGg9ZGV2aWNlLXdpZHRoLCBpbml0aWFsLXNjYWxlPTEuMCI+CiAgICA8dGl0bGU+QW1sb3AgSWR1bCBGaXRyaSAxNDQ1IEggLSBQcmVtaXVtPC90aXRsZT4KICAgIDwhLS0gRm9udCBBd2Vzb21lIDUgKGlrb24pIC0tPgogICAgPGxpbmsgcmVsPSJzdHlsZXNoZWV0IiBocmVmPSJodHRwczovL3VzZS5mb250YXdlc29tZS5jb20vcmVsZWFzZXMvdjUuMTUuNC9jc3MvYWxsLmNzcyI+CiAgICA8IS0tIEdvb2dsZSBGb250cyB1bnR1ayBBcmFiaWMgLS0+CiAgICA8bGluayBocmVmPSJodHRwczovL2ZvbnRzLmdvb2dsZWFwaXMuY29tL2NzczI/ZmFtaWx5PUFtaXJpOndnaHRANDAwOzYwMDs3MDAmZGlzcGxheT1zd2FwIiByZWw9InN0eWxlc2hlZXQiPgo8L2hlYWQ+CjwvaHRtbD4=";
            
            // Decode function (akan dipanggil saat diperlukan)
            window.decodeContent = function() {
                try {
                    const decoded = atob(encryptedContent);
                    return decoded;
                } catch(e) {
                    return '';
                }
            };
        })();

        // Ambil elemen yang diperlukan
        const envelope = document.getElementById('envelope');
        const envelopeStickerRight = document.getElementById('envelopeStickerRight');
        const envelopeStickerLeft = document.getElementById('envelopeStickerLeft');
        const eidModal = document.getElementById('eidModal');
        const modalContent = document.getElementById('eidModalContent');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Flag untuk mencegah multiple click
        let isOpening = false;
        
        // Variabel untuk musik
        let music = null;
        let isMusicPlaying = false;

        // ============================================
        // KONTEN LENGKAP PREMIUM (DIENKRIPSI DALAM FUNGSI)
        // ============================================
        function getPremiumContent() {
            // Konten diencode untuk menyulitkan view-source

                        <div style="width: 60px; height: 60px; background: #d4a373; transform: rotate(45deg); border-radius: 12px 35px 12px 35px; box-shadow: 0 6px 0 #a05c3c, 0 0 0 4px #f8e3a7; position: relative;"></div>
                    </div>

                    <!-- Teks selamat premium -->
                    <div style="font-size: 2.5rem; font-weight: 700; color: #1f4d3d; text-shadow: 3px 3px 0 #f7d44a, 5px 5px 0 rgba(0,0,0,0.1); letter-spacing: 2px; margin-bottom: 10px;">
                        <i class="fas fa-heart" style="color: #d44f4f; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));"></i> 
                        SELAMAT HARI RAYA 
                        <i class="fas fa-heart" style="color: #d44f4f; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));"></i>
                    </div>
                    
                    <div style="font-size: 3.5rem; font-family: 'Amiri', 'Traditional Arabic', serif; color: #2d5e3b; margin: 20px 0 10px; line-height: 1.3; font-weight: 700; text-shadow: 2px 2px 3px #b7934a;">

        }

        // ============================================
        // FUNGSI-FUNGSI PREMIUM
        // ============================================
        
        // Variabel global untuk menyimpan data penerima
        let dataPenerima = {
            nama: '',
            nomor: ''
        };

        // Fungsi untuk menampilkan form THR
        window.showThrForm = function() {
            const thrModal = document.getElementById('thrFormModal');
            if (thrModal) {
                thrModal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
        };

        // Fungsi untuk menutup form THR
        window.closeThrForm = function(event) {
            const thrModal = document.getElementById('thrFormModal');
            if (thrModal && (event.target === thrModal || event.target.classList?.contains('close-thr-modal') || event.target.innerText === '×')) {
                thrModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        // Fungsi untuk menyimpan data dan lanjut ke QRIS
        window.simpanDataDanLanjut = function() {
            const nama = document.getElementById('namaPenerima')?.value.trim() || '';
            let nomor = document.getElementById('nomorPenerima')?.value.trim() || '';

            if (!nama) {
                alert('Nama penerima tidak boleh kosong!');
                return;
            }
            if (!nomor) {
                alert('Nomor WhatsApp tidak boleh kosong!');
                return;
            }

            nomor = nomor.replace(/\D/g, '');
            if (nomor.startsWith('0')) {
                nomor = '62' + nomor.substring(1);
            } else if (!nomor.startsWith('62')) {
                nomor = '62' + nomor;
            }

            dataPenerima.nama = nama;
            dataPenerima.nomor = nomor;

            document.getElementById('thrFormModal').style.display = 'none';
            document.body.style.overflow = 'auto';

            // Tampilkan QRIS
            const qrisModal = document.getElementById('qrisModal');
            if (qrisModal) {
                qrisModal.style.display = 'flex';
            }
        };

        // Fungsi untuk menutup QRIS
        window.closeQrisModal = function(event) {
            const qrisModal = document.getElementById('qrisModal');
            if (qrisModal && (event.target === qrisModal || event.target.classList?.contains('close-qris-modal') || event.target.innerText === '×')) {
                qrisModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            if (event) event.stopPropagation();
        };

        // Fungsi download QRIS
        window.downloadQris = function(event) {
            event.stopPropagation();
            const img = document.getElementById('modalImage');
            if (!img) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);
            const dataURL = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = 'dana-kaget-qris.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // FUNGSI KIRIM UCAPAN KE WHATSAPP
        window.kirimUcapanKeTersimpan = function() {
            if (!dataPenerima.nama || !dataPenerima.nomor) {
                alert('Silakan isi data penerima terlebih dahulu melalui tombol "Ini Ada Sedikit THR"');
                return;
            }

            // Format pesan sesuai permintaan
            const pesanUcapan = encodeURIComponent(
                `Nama : ${dataPenerima.nama}\n` +
                `Nomor: ${dataPenerima.nomor}\n\n` +
                `Assalamu'alaikum Warahmatullahi Wabarakatuh 🕌✨\n\n` +
                `✨ *Selamat Idul Fitri 1445 H* ✨\n` +
                `تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ\n` +
                `(Taqabbalallahu minna wa minkum)\n\n` +
                `Alhamdulillah, THR sudah diterima. Terima kasih banyak ya atas kebaikannya. Semoga berkah buat kita semua. Selamat hari raya Idulfitri! 😊🙏\n\n` +
                `Salam hangat, ${dataPenerima.nama}`
            );

            // Nomor tujuan FIX
            const nomorTujuan = '6285775462359';

            // Buka WhatsApp dengan nomor tujuan tetap
            window.open(`https://wa.me/${nomorTujuan}?text=${pesanUcapan}`, '_blank');
        };

        // ============================================
        // FUNGSI MUSIK PREMIUM
        // ============================================
        
        // Inisialisasi musik
        function initMusic() {
            // Buat elemen audio jika belum ada
            if (!music) {
                music = document.createElement('audio');
                music.id = 'bgMusic';
                music.loop = true;
                music.volume = 0.7;
                
                // Sumber musik
                const source1 = document.createElement('source');
                source1.src = 'musik-idul-fitri.mp3';
                source1.type = 'audio/mpeg';
                
                const source2 = document.createElement('source');
                source2.src = 'musik-idul-fitri.ogg';
                source2.type = 'audio/ogg';
                
                music.appendChild(source1);
                music.appendChild(source2);
                
                // Sembunyikan elemen audio
                music.style.display = 'none';
                document.body.appendChild(music);
            }
            
            // Putar musik dengan promise
            const playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        isMusicPlaying = true;
                    })
                    .catch(error => {
                        // Coba putar sekali lagi dengan interaksi
                        document.addEventListener('click', function playOnClick() {
                            music.play()
                                .then(() => {
                                    isMusicPlaying = true;
                                })
                                .catch(e => {});
                            document.removeEventListener('click', playOnClick);
                        }, { once: true });
                    });
            }
        }

        // Hentikan musik
        function stopMusic() {
            if (music && isMusicPlaying) {
                music.pause();
                music.currentTime = 0;
                isMusicPlaying = false;
            }
        }

        // Event listener untuk visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopMusic();
            } else {
                if (music && !isMusicPlaying && eidModal.classList.contains('show')) {
                    music.play()
                        .then(() => {
                            isMusicPlaying = true;
                        })
                        .catch(error => {});
                }
            }
        });

        // Event listener untuk beforeunload
        window.addEventListener('beforeunload', function() {
            stopMusic();
        });

        // Event listener untuk page hide
        window.addEventListener('pagehide', function() {
            stopMusic();
        });

        // Event listener untuk focus
        window.addEventListener('focus', function() {
            if (music && !isMusicPlaying && eidModal.classList.contains('show')) {
                music.play()
                    .then(() => {
                        isMusicPlaying = true;
                    })
                    .catch(error => {});
            }
        });

        // ============================================
        // FUNGSI UNTUK MEMBUKA AMPLOP PREMIUM
        // ============================================
        function openEnvelope() {
            if (isOpening) return;
            isOpening = true;
            
            // Efek stiker sobek untuk kedua stiker
            envelopeStickerRight.classList.add('torn');
            envelopeStickerLeft.classList.add('torn');
            
            // Buka flap setelah stiker mulai sobek
            setTimeout(() => {
                envelope.classList.add('open');
            }, 200);
            
            // Set konten modal dengan fungsi yang mengembalikan konten
            modalContent.innerHTML = getPremiumContent();
            
            // Tampilkan modal setelah stiker sobek dan flap terbuka
            setTimeout(() => {
                eidModal.classList.add('show');
                document.body.style.overflow = 'hidden';
                
                // Putar musik saat amplop dibuka
                initMusic();
                
                isOpening = false;
            }, 600);
        }

        // Fungsi untuk menutup modal
        function closeEidModal() {
            eidModal.classList.remove('show');
            document.body.style.overflow = 'auto';
            
            setTimeout(() => {
                envelope.classList.remove('open');
                // Stiker tetap sobek, tidak kembali utuh
            }, 300);
            
            // Hentikan musik saat modal ditutup
            stopMusic();
        }

        // Event listener untuk amplop
        envelope.addEventListener('click', openEnvelope);

        // Tutup modal dengan tombol close
        closeModalBtn.addEventListener('click', closeEidModal);

        // Tutup modal dengan klik di luar konten
        eidModal.addEventListener('click', function(event) {
            if (event.target === eidModal) {
                closeEidModal();
            }
        });

        // Tutup modal dengan tombol ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && eidModal.classList.contains('show')) {
                closeEidModal();
            }
        });

        // Efek loading halus
        window.addEventListener('load', function() {
            document.body.style.opacity = '1';
        });

        // Proteksi tambahan: Hapus jejak di history
        if (window.history && window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
